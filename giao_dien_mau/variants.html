<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản lý biến thể - Sneat Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sidebar-w: 260px;
    --header-h: 64px;
    --purple: #7367f0;
    --purple-light: #ebe9fd;
    --purple-pale: #f4f3fd;
    --red: #ea5455;
    --green: #28c76f;
    --sidebar-bg: #fff;
    --body-bg: #f8f7fa;
    --border: #ebebeb;
    --text-main: #444050;
    --text-muted: #b4b2b7;
    --shadow: 0 4px 24px 0 rgba(34,41,47,.1);
  }

  body { font-family: 'Public Sans', sans-serif; background: var(--body-bg); color: var(--text-main); display: flex; min-height: 100vh; font-size: 14px; }

  /* ─── SIDEBAR & SHELL ─── */
  .sidebar { width: var(--sidebar-w); min-height: 100vh; background: var(--sidebar-bg); border-right: 1px solid var(--border); border-left: 3px solid var(--purple); position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
  .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 22px 20px 18px; border-bottom: 1px solid var(--border); text-decoration: none; }
  .logo-icon { width: 32px; height: 32px; background: var(--purple); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; }
  .logo-text { font-size: 20px; font-weight: 700; color: var(--text-main); }
  .nav { padding: 10px 0; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 20px; color: var(--text-main); text-decoration: none; }
  .nav-item.active { color: var(--purple); background: var(--purple-light); border-radius: 6px; margin: 0 12px; padding: 9px 10px; }
  .shell { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }

  /* ─── MAIN CONTENT ─── */
  .main { padding: 24px; display: flex; flex-direction: column; gap: 20px; }
  .page-header { display: flex; align-items: center; justify-content: space-between; }
  .page-title { font-size: 20px; font-weight: 600; }
  .btn-primary { background: var(--purple); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
  .card-bar { height: 3px; width: 100%; background: linear-gradient(90deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); border-radius: 3px 3px 0 0; }
  .card { background: #fff; border-radius: 0 0 12px 12px; box-shadow: var(--shadow); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { padding: 14px 18px; font-size: 11.5px; font-weight: 600; color: var(--text-section); text-align: left; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  td { padding: 14px 18px; border-bottom: 1px solid var(--border); }

  /* ─── MODAL STYLES ─── */
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal-card { background: #fff; width: 100%; max-width: 650px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); overflow: hidden; animation: modalIn 0.3s ease-out; }
  @keyframes modalIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 18px; font-weight: 600; color: var(--text-main); }
  .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-muted); }

  .modal-body { padding: 24px; display: flex; flex-direction: column; gap: 20px; max-height: 80vh; overflow-y: auto; }

  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-label { font-weight: 600; font-size: 13px; color: var(--text-main); text-transform: uppercase; letter-spacing: 0.5px; }
  .form-input, .form-select { padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; width: 100%; }
  .form-input:focus, .form-select:focus { border-color: var(--purple); box-shadow: 0 0 0 3px var(--purple-light); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  /* Value manager */
  .value-manager { border: 1px solid var(--border); border-radius: 10px; padding: 16px; background: #fcfcfd; }
  .value-header { display: grid; grid-template-columns: 50px 1fr 40px; gap: 12px; margin-bottom: 8px; font-size: 11px; font-weight: 700; color: var(--text-section); text-transform: uppercase; }
  .value-header.no-color { grid-template-columns: 1fr 40px; }

  .value-row { display: grid; grid-template-columns: 50px 1fr 40px; gap: 12px; margin-bottom: 10px; align-items: center; }
  .value-row.no-color { grid-template-columns: 1fr 40px; }

  .value-color-input { width: 100%; height: 40px; padding: 2px; border-radius: 6px; border: 1px solid #d1d5db; cursor: pointer; }
  .btn-add-val { background: var(--purple-light); color: var(--purple); border: 1px dashed var(--purple); padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 8px; transition: all 0.2s; }
  .btn-add-val:hover { background: var(--purple); color: #fff; }

  /* Switch UI */
  .switch-group { display: flex; align-items: center; gap: 12px; background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
  .switch { position: relative; display: inline-block; width: 42px; height: 22px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px; }
  .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
  input:checked + .slider { background-color: var(--purple); }
  input:checked + .slider:before { transform: translateX(20px); }

  .modal-footer { padding: 20px 24px; background: #f9fafb; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px; }
  .btn-cancel { background: #fff; border: 1px solid #d1d5db; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; color: #64748b; }
  .btn-save { background: var(--purple); color: #fff; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; box-shadow: 0 4px 12px rgba(115, 103, 240, 0.3); }

  /* Helper Classes */
  .hidden { display: none !important; }

</style>
</head>
<body>

<aside class="sidebar">
  <a class="sidebar-logo" href="#"><div class="logo-icon">S</div><span class="logo-text">sneat</span></a>
  <nav class="nav">
    <a href="#" class="nav-item"><span>📊 Dashboard</span></a>
    <div style="padding: 18px 20px 6px; font-size: 11px; color: var(--text-section); text-transform: uppercase;">Quản lý</div>
    <a href="#" class="nav-item"><span>👥 Người dùng</span></a>
    <a href="#" class="nav-item"><span>📁 Danh mục</span></a>
    <a href="#" class="nav-item active"><span>✨ Biến thể</span></a>
  </nav>
</aside>

<div class="shell">
  <main class="main">
    <div class="page-header">
      <div class="page-title">Quản lý biến thể</div>
      <button class="btn-primary" onclick="openModal()">+ Thêm biến thể</button>
    </div>

    <div class="card-bar"></div>
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Tên thuộc tính</th>
            <th>Mã</th>
            <th>Loại</th>
            <th>Biến thể?</th>
            <th>Thao tác</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><strong>Màu sắc</strong></td>
            <td><code>color</code></td>
            <td>Color Picker</td>
            <td><span style="color: var(--green); font-weight: 600;">Có</span></td>
            <td><button style="border:none; background:none; cursor:pointer;" onclick="openModal()">✏️</button></td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- ═══════════════ MODAL THÊM THUỘC TÍNH ═══════════════ -->
<div id="addModal" class="modal-overlay">
  <div class="modal-card">
    <div class="modal-header">
      <h3 class="modal-title">Cấu hình thuộc tính mới</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>

    <div class="modal-body">
      <!-- Tên & Mã -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Tên hiển thị</label>
          <input type="text" class="form-input" placeholder="Ví dụ: Màu sắc, Kích thước...">
        </div>
        <div class="form-group">
          <label class="form-label">Mã (Slug)</label>
          <input type="text" class="form-input" placeholder="Ví dụ: color, size...">
        </div>
      </div>

      <!-- Loại hiển thị -->
      <div class="form-group">
        <label class="form-label">Kiểu nhập liệu / Hiển thị</label>
        <select class="form-select" id="displayTypeSelect" onchange="toggleValueInputs(this.value)">
          <option value="color">Color Picker (Có mã màu)</option>
          <option value="button">Button Group (Chỉ có chữ)</option>
          <option value="radio">Radio Button (Chỉ có chữ)</option>
          <option value="select">Select Box (Chỉ có chữ)</option>
        </select>
      </div>

      <!-- Config switches -->
      <div class="form-row">
        <div class="switch-group">
          <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
          <div style="display:flex; flex-direction:column;">
            <span style="font-size:13.5px; font-weight:600;">Làm biến thể</span>
            <span style="font-size:11px; color:var(--text-muted);">Dùng để phân loại sản phẩm</span>
          </div>
        </div>
        <div class="switch-group">
          <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
          <div style="display:flex; flex-direction:column;">
            <span style="font-size:13.5px; font-weight:600;">Hiện bộ lọc</span>
            <span style="font-size:11px; color:var(--text-muted);">Hiển thị ở trang danh sách</span>
          </div>
        </div>
      </div>

      <!-- Quản lý giá trị -->
      <div class="form-group">
        <label class="form-label">Danh sách giá trị</label>
        <div class="value-manager">
          <!-- Header for list -->
          <div id="valueListHeader" class="value-header">
            <span>Màu</span>
            <span>Tên giá trị</span>
            <span></span>
          </div>

          <div id="valueRowsContainer">
            <!-- Row Color Sample -->
            <div class="value-row">
              <input type="color" class="value-color-input" value="#7367f0">
              <input type="text" class="form-input" placeholder="Tên giá trị (e.g. Đỏ)">
              <button style="color: var(--red); border:none; background:none; cursor:pointer; font-size:18px;">&times;</button>
            </div>
            <!-- Row Text Sample (will be modified by JS) -->
          </div>
          
          <button class="btn-add-val">+ Thêm một giá trị mới</button>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Đóng</button>
      <button class="btn-save">Xác nhận Lưu</button>
    </div>
  </div>
</div>

<script>
  function openModal() {
    document.getElementById('addModal').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('addModal').style.display = 'none';
  }

  function toggleValueInputs(type) {
    const header = document.getElementById('valueListHeader');
    const rows = document.querySelectorAll('.value-row');
    const colorInputs = document.querySelectorAll('.value-color-input');

    if (type === 'color') {
      header.classList.remove('no-color');
      rows.forEach(row => row.classList.remove('no-color'));
      colorInputs.forEach(input => input.classList.remove('hidden'));
    } else {
      header.classList.add('no-color');
      rows.forEach(row => row.classList.add('no-color'));
      colorInputs.forEach(input => input.classList.add('hidden'));
      // Hide the "Màu" column header
      header.querySelector('span:first-child').style.visibility = 'hidden';
    }

    // Reset header text visibility
    if (type === 'color') {
       header.querySelector('span:first-child').style.visibility = 'visible';
    }
  }

  // Khởi tạo trạng thái mặc định
  window.onload = () => {
    toggleValueInputs(document.getElementById('displayTypeSelect').value);
  }
</script>

</body>
</html>
